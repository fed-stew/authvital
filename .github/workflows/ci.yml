# =============================================================================
# AuthVital CI - Test & Build
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Backend: Test & Build
  # ===========================================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build contracts
        run: npm run build:contracts

      - name: Build shared
        run: npm run build -w @authvital/shared

      - name: Build backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/authvital_test
        run: npm run build:backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/authvital_test
          JWT_SECRET: test-secret-for-ci-not-real
          BASE_URL: http://localhost:8000
        run: npm test -w @authvital/backend -- --silent

  # ===========================================================================
  # React SDK: Build & Typecheck
  # ===========================================================================
  sdk-react-build:
    name: React SDK Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build contracts
        run: npm run build:contracts

      - name: Build shared
        run: npm run build -w @authvital/shared

      - name: Build React SDK
        run: npm run build -w @authvital/react

      - name: Typecheck
        run: npm run typecheck -w @authvital/react

  # ===========================================================================
  # Node SDK: Build & Typecheck
  # ===========================================================================
  sdk-node-build:
    name: Node SDK Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build contracts
        run: npm run build:contracts

      - name: Build shared
        run: npm run build -w @authvital/shared

      - name: Build Node SDK
        run: npm run build -w @authvital/node

      - name: Typecheck
        run: npm run typecheck -w @authvital/node

  # ===========================================================================
  # Frontend: Build
  # ===========================================================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build contracts
        run: npm run build:contracts

      - name: Build shared
        run: npm run build -w @authvital/shared

      - name: Build frontend
        run: npm run build -w @authvital/frontend
