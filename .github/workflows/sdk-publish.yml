# =============================================================================
# AuthVital SDKs - Publish to npm
# =============================================================================
name: SDK Publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'packages/sdk-react/**'
      - 'packages/sdk-node/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Publish React SDK (@authvital/react)
  # ===========================================================================
  publish-react:
    name: Publish React SDK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared package
        run: npm run build -w @authvital/shared

      - name: Build React SDK
        run: npm run build -w @authvital/react

      - name: Typecheck React SDK
        run: npm run typecheck -w @authvital/react

      - name: Publish React SDK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/sdk-react
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version --allow-same-version
            npm publish --tag latest --access public
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            BUILD_NUM=${{ github.run_number }}
            npm version prerelease --preid="dev.${BUILD_NUM}.${SHORT_SHA}" --no-git-tag-version
            npm publish --tag dev --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ===========================================================================
  # Publish Node.js SDK (@authvital/node)
  # ===========================================================================
  publish-node:
    name: Publish Node SDK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared package
        run: npm run build -w @authvital/shared

      - name: Build Node SDK
        run: npm run build -w @authvital/node

      - name: Typecheck Node SDK
        run: npm run typecheck -w @authvital/node

      - name: Publish Node SDK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/sdk-node
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version --allow-same-version
            npm publish --tag latest --access public
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            BUILD_NUM=${{ github.run_number }}
            npm version prerelease --preid="dev.${BUILD_NUM}.${SHORT_SHA}" --no-git-tag-version
            npm publish --tag dev --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}