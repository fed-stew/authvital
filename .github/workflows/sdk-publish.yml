# =============================================================================
# AuthVital SDKs - Publish to npm
# =============================================================================
name: SDK Publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'packages/sdk-core/**'
      - 'packages/sdk-browser/**'
      - 'packages/sdk-server/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Publish Core SDK (@authvital/core)
  # Dependencies: shared
  # ===========================================================================
  publish-core:
    name: Publish Core SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared package
        run: npm run build -w @authvital/shared

      - name: Build Core SDK
        run: npm run build -w @authvital/core

      - name: Typecheck Core SDK
        run: npm run typecheck -w @authvital/core

      - name: Publish Core SDK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/sdk-core
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version --allow-same-version
            npm publish --tag latest --access public
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            BUILD_NUM=${{ github.run_number }}
            npm version prerelease --preid="dev.${BUILD_NUM}.${SHORT_SHA}" --no-git-tag-version
            npm publish --tag dev --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ===========================================================================
  # Publish Browser SDK (@authvital/browser)
  # Dependencies: shared -> core
  # ===========================================================================
  publish-browser:
    name: Publish Browser SDK
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared package
        run: npm run build -w @authvital/shared

      - name: Build Core SDK
        run: npm run build -w @authvital/core

      - name: Build Browser SDK
        run: npm run build -w @authvital/browser

      - name: Typecheck Browser SDK
        run: npm run typecheck -w @authvital/browser

      - name: Publish Browser SDK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/sdk-browser
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version --allow-same-version
            npm publish --tag latest --access public
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            BUILD_NUM=${{ github.run_number }}
            npm version prerelease --preid="dev.${BUILD_NUM}.${SHORT_SHA}" --no-git-tag-version
            npm publish --tag dev --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ===========================================================================
  # Publish Server SDK (@authvital/server)
  # Dependencies: shared -> core
  # ===========================================================================
  publish-server:
    name: Publish Server SDK
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared package
        run: npm run build -w @authvital/shared

      - name: Build Core SDK
        run: npm run build -w @authvital/core

      - name: Build Server SDK
        run: npm run build -w @authvital/server

      - name: Typecheck Server SDK
        run: npm run typecheck -w @authvital/server

      - name: Publish Server SDK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/sdk-server
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version --allow-same-version
            npm publish --tag latest --access public
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            BUILD_NUM=${{ github.run_number }}
            npm version prerelease --preid="dev.${BUILD_NUM}.${SHORT_SHA}" --no-git-tag-version
            npm publish --tag dev --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

