# =============================================================================
# AuthVital - Local Development Seed Configuration
# =============================================================================
#
# This file defines everything needed to bootstrap a local AuthVital instance
# with realistic test data: admin credentials, OAuth apps, tenants, users,
# roles, and memberships.
#
# Usage:
#   1. Copy this file to root:  cp seed.config.example.yaml seed.config.yaml
#   2. Customize the values below for your project
#   3. Run the seed:           npm run prisma:seed
#   4. Re-run anytime — all operations are idempotent (upsert)
#
# The seed script looks for files in this order (from project root):
#   1. seed.config.yaml     (your local copy — gitignored)
#   2. seed.config.example.yaml  (this file — committed to repo)
#
# ⚠️  LOCAL DEVELOPMENT ONLY — never use these credentials in production!
# =============================================================================

# =============================================================================
# URL VALIDATION RULES
# =============================================================================
#
# All URLs in this config are validated for security:
#
# Redirect URIs (OAuth callbacks, post-logout):
#   - Must start with http:// or https://
#   - No dangerous schemes: javascript:, data:, file:, vbscript:, about:, blob:
#   - Wildcards (*) only allowed at subdomain start: https://*.example.com/callback
#   - Tenant placeholder {tenant} only at subdomain start: https://{tenant}.example.com/callback
#   - No fragments (#), no backslashes, no null bytes
#
# Branding URLs (logo, support, privacy, terms):
#   - Must be valid http:// or https:// URLs
#   - No wildcards, no placeholders
#   - In production: https:// strongly recommended
#
# CORS Origins (allowed_web_origins):
#   - Must be exact match (no wildcards allowed in CORS)
#   - Example: https://app.example.com (valid)
#   - Invalid: https://*.example.com (CORS doesn't support wildcards)
#
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# Instance Settings
# ─────────────────────────────────────────────────────────────────────────────
# Global configuration for this AuthVital instance.
# These map to the InstanceMeta singleton in the database.
#
instance:
  name: "AuthVital Local Dev"

  # Allow public sign-up (users can register without an invitation)
  allow_sign_up: true

  # Automatically create a new tenant when a user signs up
  auto_create_tenant: true

  # Allow sign-ups from generic email domains (gmail.com, outlook.com, etc.)
  allow_generic_domains: true

  # Allow anonymous (no email verification) sign-ups
  allow_anonymous_sign_up: false

  # Branding (optional — shown on login/signup pages)
  branding:
    name: "My Company"
    logo_url: "https://cdn.example.com/logo.png"      # Must be https:// (no javascript:, data:, etc.)
    icon_url: "https://cdn.example.com/favicon.ico"   # Recommended: favicon/app icon
    primary_color: "#6366f1"
    background_color: "#f8fafc"
    accent_color: "#8b5cf6"
    support_url: "https://help.example.com"           # Support/help page
    privacy_url: "https://example.com/privacy"        # Privacy policy (required in many jurisdictions)
    terms_url: "https://example.com/terms"             # Terms of service


# ─────────────────────────────────────────────────────────────────────────────
# Super Admin
# ─────────────────────────────────────────────────────────────────────────────
# Credentials for the /admin dashboard. This is the system-level administrator,
# separate from tenant users.
#
super_admin:
  email: admin@localhost.com
  password: admin123
  display_name: "Local Admin"


# ─────────────────────────────────────────────────────────────────────────────
# OAuth Applications
# ─────────────────────────────────────────────────────────────────────────────
# Each application is an OAuth 2.0 client. Your frontend/backend apps connect
# to AuthVital through these.
#
# Vite's default dev server runs on http://localhost:5173
#
applications:
  # ── Single Page Application (SPA) with various redirect patterns ─────────
  - name: "My Local App"
    slug: my-local-app
    type: SPA                                  # SPA | MACHINE

    # Fixed client_id for local development (SPA apps don't need client_secret)
    client_id: local-spa-client-id

    # OAuth redirect URIs — where AuthVital sends users after login
    # Valid patterns:
    #   - Exact match: https://app.example.com/callback
    #   - Wildcard subdomain: https://*.example.com/callback (only at start!)
    #   - Tenant placeholder: https://{tenant}.example.com/callback (validates tenant exists)
    #   - Localhost (dev only): http://localhost:5173/callback
    # Invalid patterns:
    #   - https://example.com/*.callback (wildcards only allowed in subdomains)
    #   - javascript:alert(1) (XSS - blocked)
    #   - https://evil.com (must match registered pattern)
    redirect_uris:
      - http://localhost:5173/auth/callback          # Development only
      # - https://app.example.com/auth/callback    # Production exact match
      # - https://*.example.com/auth/callback       # Any subdomain
      # - https://{tenant}.example.com/callback     # Per-tenant subdomain

    # Where to redirect after logout
    post_logout_redirect_uris:
      - http://localhost:5173
      # - https://app.example.com

    # CORS — origins allowed to call AuthVital's OAuth endpoints
    # Must be exact match (no wildcards in CORS origins!)
    allowed_web_origins:
      - http://localhost:5173
      # - https://app.example.com
      # - https://admin.example.com

    # Application branding (overrides instance branding for this app)
    # branding_name: "My App"
    # branding_logo_url: "https://cdn.example.com/app-logo.png"
    # branding_support_url: "https://help.example.com/app-support"

    # Token lifetimes (optional, in seconds)
    # access_token_ttl: 3600                   # 1 hour (default)
    # refresh_token_ttl: 604800                # 7 days (default)

    # Application-level roles
    # These are YOUR app's roles (e.g., "editor", "viewer"), not AuthVital's
    # tenant roles (owner/admin/member). They appear in the JWT's app_roles claim.
    roles:
      - name: Admin
        slug: admin
        description: "Full application access"
      - name: Editor
        slug: editor
        description: "Can create and edit content"
        is_default: true                       # Auto-assigned to new members
      - name: Viewer
        slug: viewer
        description: "Read-only access"

  # ═══════════════════════════════════════════════════════════════════════════
  # LICENSING EXAMPLES - Uncomment to test different licensing modes
  # ═══════════════════════════════════════════════════════════════════════════
  # Each application demonstrates a different licensing mode:
  #   - FREE: All users get access automatically
  #   - TENANT_WIDE: All tenant members share a license
  #   - PER_SEAT: Individual seat assignment per user
  #
  # APP 1: FREE MODE - All users get access automatically
  # Best for: Open-access tools, basic features, freemium tiers
  # Stripe: No subscription needed, or use metered billing for usage
  #
