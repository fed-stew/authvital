  #       slug: pro-seat
  #       description: "Individual user license with CRM access"
  #       max_members: null  # Per-seat doesn't limit total members
  #       features:
  #         sso: true
  #         api_access: true
  #         webhooks: true
  #         advanced_analytics: false
