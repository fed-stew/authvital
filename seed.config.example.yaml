  #     - http://localhost:5174
  #   allowed_web_origins:
  #     - http://localhost:5174

  # ═══════════════════════════════════════════════════════════════════════════
  # APP 3: PER-SEAT MODE - Individual seat assignment
  # Best for: SaaS per-user pricing, enterprise tools
  # Stripe: Quantity-based subscription (per seat)
  # Example: Microsoft 365, Slack, Salesforce
  #
  # - name: "Pro CRM"
  #   slug: pro-crm
  #   type: SPA
  #   client_id: pro-crm-client
