# =============================================================================
# Lefthook - Git hooks manager
# Install: npm install -g @evilmartians/lefthook
# Run manually: lefthook run pre-push
# =============================================================================

pre-push:
  jobs:
    - name: build contracts
      run: npm run build -w @authvital/contracts
      
    - name: build shared
      run: npm run build -w @authvital/shared
      
    - name: build backend
      run: npm run prisma:generate -w @authvital/backend && npm run build -w @authvital/backend
      
    - name: build frontend
      run: npm run build -w @authvital/frontend
      
    - name: build node sdk
      run: npm run build -w @authvital/sdk-node
      
    - name: build react sdk
      run: npm run build -w @authvital/sdk-react

pre-commit:
  parallel: true
  jobs:
    - name: lint
      run: npm run lint
      glob: "*.{js,ts,jsx,tsx}"
