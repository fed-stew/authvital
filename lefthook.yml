# =============================================================================
# Lefthook - Git hooks manager
# Install: npm install -g @evilmartians/lefthook
# Run manually: lefthook run pre-push
# =============================================================================

pre-push:
  jobs:
    - name: build shared
      run: npm run build -w @authvital/shared
      
    - name: build react sdk
      run: npm run build -w @authvital/react
      
    - name: build node sdk
      run: npm run build -w @authvital/node

pre-commit:
  parallel: true
  jobs:
    - name: lint
      run: npm run lint
      glob: "*.{js,ts,jsx,tsx}"
